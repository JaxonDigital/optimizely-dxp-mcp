# Gitleaks configuration for detecting secrets
# https://github.com/gitleaks/gitleaks

title = "Optimizely DXP MCP Server Secret Detection"

[allowlist]
description = "Allowlist for Optimizely DXP MCP"
paths = [
    "test-.*\\.js",
    ".*\\.test\\.js",
    ".*\\.md"
]

[[rules]]
description = "Optimizely API Key"
regex = '''(?i)(optimizely[_\-\s]?api[_\-\s]?key|OPTIMIZELY_API_KEY)[\s]*[=:]\s*['"]?([a-zA-Z0-9]{20,})'''
tags = ["api-key", "optimizely"]

[[rules]]
description = "Optimizely API Secret"
regex = '''(?i)(optimizely[_\-\s]?api[_\-\s]?secret|OPTIMIZELY_API_SECRET)[\s]*[=:]\s*['"]?([a-zA-Z0-9]{20,})'''
tags = ["api-secret", "optimizely"]

[[rules]]
description = "Generic API Key"
regex = '''(?i)(api[_\-\s]?key|apikey)[\s]*[=:]\s*['"]?([a-zA-Z0-9]{32,})'''
tags = ["api-key", "generic"]

[[rules]]
description = "Generic Secret"
regex = '''(?i)(secret|password|passwd|pwd)[\s]*[=:]\s*['"]?([a-zA-Z0-9!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]{8,})'''
tags = ["secret", "generic"]

[[rules]]
description = "Bearer Token"
regex = '''(?i)bearer\s+[a-zA-Z0-9\-_\.]+'''
tags = ["token", "bearer"]

[[rules]]
description = "Basic Auth"
regex = '''(?i)basic\s+[a-zA-Z0-9+/=]+'''
tags = ["auth", "basic"]

[[rules]]
description = "Private Key"
regex = '''-----BEGIN (RSA|EC|DSA|OPENSSH) PRIVATE KEY-----'''
tags = ["key", "private"]

[[rules]]
description = "Azure Connection String"
regex = '''DefaultEndpointsProtocol=https;AccountName=[^;]+;AccountKey=[^;]+;'''
tags = ["azure", "connection-string"]

[[rules]]
description = "JWT Token"
regex = '''eyJ[a-zA-Z0-9\-_]+\.eyJ[a-zA-Z0-9\-_]+\.[a-zA-Z0-9\-_]+'''
tags = ["jwt", "token"]